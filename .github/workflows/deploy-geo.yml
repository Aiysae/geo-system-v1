name: Deploy geo-strategy-system to ECS

on:
  push:
    branches: [main]
    paths:
      - "geo-strategy-system/**"
      - ".github/workflows/deploy-geo.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="/var/www/geo-strategy-system"
            fi
            cd "$DEPLOY_PATH"
            git pull origin main

            APP_DIR=""
            while IFS= read -r package_file; do
              if grep -q '"name"[[:space:]]*:[[:space:]]*"geo-strategy-system"' "$package_file"; then
                APP_DIR="$(dirname "$package_file")"
                break
              fi
            done < <(find "$DEPLOY_PATH" -maxdepth 5 -name package.json -not -path '*/node_modules/*' -print)

            if [ -z "$APP_DIR" ]; then
              echo "Could not find geo-strategy-system package.json under $DEPLOY_PATH"
              exit 1
            fi

            cd "$APP_DIR"

            ENV_FILE=""
            for candidate in "$APP_DIR/.env.production" "$APP_DIR/../.env.production" "$DEPLOY_PATH/.env.production" "$DEPLOY_PATH/../.env.production"; do
              if [ -f "$candidate" ]; then
                ENV_FILE="$candidate"
                break
              fi
            done

            if [ -n "$ENV_FILE" ]; then
              set -a
              # shellcheck disable=SC1091
              source "$ENV_FILE"
              set +a
            else
              echo "Warning: .env.production not found; using existing environment"
            fi

            if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
              npm ci
            else
              npm install
            fi

            npm run build
            pm2 restart geo || pm2 start ecosystem.config.cjs
            pm2 save
